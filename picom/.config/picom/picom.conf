# Window type settings ‚ÄĒ control per-type behavior:
wintypes:
{
  tooltip     = { fade = true; shadow = false; opacity = 0.90; focus = true; full-shadow = false; };
  dock        = { shadow = false; clip-shadow-above = true; };
  dnd         = { shadow = false; };
  popup_menu  = { opacity = 1.0; };
  dropdown_menu = { opacity = 1.0; };
};
