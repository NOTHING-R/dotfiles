#
#  Picom Config for Arch Linux
#  Features: Blur (active + inactive), Shadows, Opacity rules for Firefox & VSCode
#  Backend: GLX (required for dual_kawase blur)
#  Place this file at: ~/.config/picom/picom.conf


#################################
#           Backend             #
#################################

# GLX backend is required for blur effects (dual_kawase).
# Do NOT use "xrender" if you want blur to work.
backend = "glx";

# Avoid rebinding pixmap on window damage. May improve performance.
# Disable if you see graphical glitches.
# glx-no-rebind-pixmap = true;

# Disable stencil buffer in GLX backend. Might improve performance.
# Turn off if you get visual artifacts.
# glx-no-stencil = true;

# Use damage information to reduce redraws. Improves performance.
use-damage = true;

# Enable vsync to avoid screen tearing.
vsync = true;


#################################
#            Shadows            #
#################################

# Enable shadows on windows.
shadow = true;

# Blur radius for shadows, in pixels. Higher = softer/larger shadow.
shadow-radius = 14;

# Shadow opacity (0.0 - 1.0).
shadow-opacity = 0.75;

# Shadow offsets (pixels). Negative = top-left offset direction.
shadow-offset-x = -12;
shadow-offset-y = -12;

# Exclude shadows on these windows to avoid visual glitches:
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "_GTK_FRAME_EXTENTS@:c"
];


#################################
#            Fading             #
#################################

# Fade windows in/out when opening/closing and on opacity change.
fading = true;

# Opacity change step during fade-in (smaller = slower).
fade-in-step = 0.03;

# Opacity change step during fade-out.
fade-out-step = 0.03;

# Time between fade steps, in milliseconds.
fade-delta = 6;

# Do not fade on window open/close ‚ÄĒ only on opacity changes.
# no-fading-openclose = false;


#################################
#     Transparency / Opacity    #
#################################

# Default opacity for active (focused) windows.
# 1.0 = fully opaque.
active-opacity = 1.0;

# Default opacity for inactive (unfocused) windows.
# Slightly transparent for inactive windows.
inactive-opacity = 0.85;

# Opacity for window titlebars and borders (frame).
frame-opacity = 0.9;

# Let inactive-opacity override the _NET_WM_OPACITY window property.
inactive-opacity-override = false;

# Dim inactive windows. 0.0 = no dimming, 1.0 = fully dimmed.
inactive-dim = 0.1;

# Use fixed inactive dim value (don't adjust based on opacity).
inactive-dim-fixed = true;

# Per-application opacity rules:
# Format: "OPACITY:CONDITION"
# Opacity is a percentage (0‚Äď100).
# Firefox and VSCode get special treatment below.
opacity-rule = [
  # Firefox ‚ÄĒ fully opaque when focused, slightly transparent when not
 "100:class_g = 'firefox' && fullscreen",
  "80:class_g = 'firefox' && focused",
  "88:class_g = 'firefox' && !focused",

"100:class_g = 'betterlockscreen'",

  # VSCode (code-oss is the Arch package name; also cover 'Code' for AUR builds)
  "95:class_g = 'Code' && focused",
  "95:class_g = 'Code' && focused",

  "88:class_g = 'Code-oss' && !focused",
  "88:class_g = 'Code' && !focused",

  # Keep desktop and dock bars fully opaque
  "100:window_type = 'dock'",
  "100:window_type = 'desktop'"
];


#################################
#     Background Blurring       #
#################################

# Blur method: "dual_kawase" gives the best quality frosted-glass effect.
# Requires the GLX backend (set above).
# Other options: "gaussian", "box", "kernel", "none"
blur-method = "dual_kawase";

# Disable at full screenn
# unredir-if-possible = true;

# Blur strength for dual_kawase (range: 1‚Äď20). Higher = more blur.
blur-strength = 4;

# Blur the background of semi-transparent / ARGB windows.
blur-background = true;

# Also blur when the window *frame* (titlebar/border) is not opaque.
blur-background-frame = true;

# Use a fixed blur strength during fading (prevents blur artifacts while animating).
blur-background-fixed = false;

# Exclude certain windows from background blur to avoid glitches:
blur-background-exclude = [
  # Desktop and dock should never be blurred
  "window_type = 'dock'",
  "window_type = 'desktop'",

  # Prevents picom from blurring the selection overlay in screenshot tools
  "_GTK_FRAME_EXTENTS@:c",
  "class_g = 'betterlockscreen'",
  # Uncomment to exclude Rofi launcher from blur (if you use Rofi)
  # "class_g = 'Rofi'",

  # Uncomment to exclude status bars like Polybar:
  # "class_g = 'Polybar'"
];


#################################
#       Rounded Corners         #
#################################

# Set corner radius > 0 to round window corners.
# Disable (set to 0) if you prefer sharp corners.
corner-radius = 8;

# Exclude rounded corners on these windows:
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'"
];


#################################
#         General / WM          #
#################################

# Use EWMH _NET_WM_ACTIVE_WINDOW to detect the focused window.
# More reliable than FocusIn/Out events. Works best with EWMH-compliant WMs
# (i3, bspwm, openbox, xfwm4, etc.).
use-ewmh-active-win = true;

# Detect rounded corners and don't draw shadows on them.
detect-rounded-corners = true;

# Detect window opacity from the _NET_WM_OPACITY property on client windows.
# Useful for WMs that don't forward this property to the frame window.
detect-client-opacity = true;

# Mark all non-WM but override-redirect windows active.
mark-ovredir-focused = false;

# Mark windows that have no WM frame focused.
mark-wmwin-focused = true;

# Detect clients behind shaped windows (needed for some WMs).
detect-transient = true;
detect-client-leader = true;

#################################
#   ANIMATIONS         #
#################################

animations = (

  # Window open ‚ÄĒ scale up from 95% with fade in
  {
    triggers = ["open"];
    opacity = {
      curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
      start    = 0;
      end      = 1;
      duration = 0.18;
    };
    scale-x = {
      curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
      start    = 0.95;
      end      = 1;
      duration = 0.18;
    };
    scale-y = {
      curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
      start    = 0.95;
      end      = 1;
      duration = 0.18;
    };
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
  },

  # Window close ‚ÄĒ scale down to 95% with fade out (faster than open)
  {
    triggers = ["close"];
    opacity = {
      curve    = "linear";
      start    = 1;
      end      = 0;
      duration = 0.12;
    };
    scale-x = {
      curve    = "cubic-bezier(0.55, 0, 1, 0.45)";
      start    = 1;
      end      = 0.95;
      duration = 0.12;
    };
    scale-y = {
      curve    = "cubic-bezier(0.55, 0, 1, 0.45)";
      start    = 1;
      end      = 0.95;
      duration = 0.12;
    };
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
  },

  # Window resize ‚ÄĒ springy scale from previous size
  {
    triggers = ["size"];
    scale-x = {
      curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
      start    = "window-width-before / window-width";
      end      = 1;
      duration = 0.22;
    };
    scale-y = {
      curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
      start    = "window-height-before / window-height";
      end      = 1;
      duration = 0.22;
    };
    offset-x = {
      curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
      start    = "window-x-before - window-x";
      end      = 0;
      duration = 0.22;
    };
    offset-y = {
      curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
      start    = "window-y-before - window-y";
      end      = 0;
      duration = 0.22;
    };
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
  },

  # Window move ‚ÄĒ smooth slide from previous position
  {
    triggers = ["geometry"];
    offset-x = {
      curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
      start    = "window-x-before - window-x";
      end      = 0;
      duration = 0.22;
    };
    offset-y = {
      curve    = "cubic-bezier(0.175, 0.885, 0.32, 1.275)";
      start    = "window-y-before - window-y";
      end      = 0;
      duration = 0.22;
    };
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
  },

)


