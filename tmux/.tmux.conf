# ─────────────────────────────────────────
#  Prefix
# ─────────────────────────────────────────
unbind C-b
set -g prefix C-l
bind C-l send-prefix
bind T set-option -g status                                            # leader shift-t → toggle status bar
# ─────────────────────────────────────────
#  Splits
# ─────────────────────────────────────────
unbind %
unbind '"'
bind v split-window -h -c "#{pane_current_path}"                       # leader v       → vertical split
bind m split-window -v -c "#{pane_current_path}"                       # leader m       → horizontal split
bind x kill-pane                                                       # leader x       → kill pane
bind Left  select-pane -L
bind Down  select-pane -D
bind Up    select-pane -U
bind Right select-pane -R

# ─────────────────────────────────────────
#  Windows
# ─────────────────────────────────────────
bind n command-prompt -p "Window name:"  "new-window -n '%%'"          # leader n       → new named window
bind j previous-window                                                  # leader j       → previous window
bind k next-window                                                      # leader k       → next window
bind c kill-window                                                      # leader c       → kill window
bind r command-prompt -p "Rename window:" "rename-window '%%'"         # leader e       → rename window

# ─────────────────────────────────────────
#  Sessions
# ─────────────────────────────────────────
bind h switch-client -p                                                 # leader h       → previous session
bind l switch-client -n                                                 # leader l       → next session
bind N command-prompt -p "Session name:" "new-session -s '%%'"         # leader shift-n → new named session
bind C kill-session                                                     # leader shift-c → kill session
bind R command-prompt -p "Rename session:" "rename-session '%%'"       # leader shift-e → rename session

# ─────────────────────────────────────────
#  Reload config
# ─────────────────────────────────────────
bind e source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ─────────────────────────────────────────
#  Quality of life
# ─────────────────────────────────────────
set -g mouse on                  # mouse support
set -g base-index 1              # windows + sessions start at 1
set -g pane-base-index 1        # panes start at 1
set -g renumber-windows on       # keep window numbers tidy
set -s escape-time 0             # no delay for escape key
set -g history-limit 10000       # scrollback buffer
set -g automatic-rename off     # don't override window names
set -g allow-rename off          # don't let programs rename windows

# ─────────────────────────────────────────
#  Appearance
# ─────────────────────────────────────────
set -g default-terminal "screen-256color"
set-option -g status-position top
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"

# ─────────────────────────────────────────
#  Image passthrough (for image.nvim)
# ─────────────────────────────────────────
set -gq allow-passthrough on
set -g visual-activity off


# ─────────────────────────────────────────
#  Catppuccin
# ─────────────────────────────────────────
set -g @catppuccin_flavor "mocha"

set -g @catppuccin_window_status_style "rounded"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #S "

# set -g status-interval 5    # refresh every 5 seconds instead of default 1
set -g status-left "#[bg=#89b4fa,fg=#1e1e2e,bold] #(tmux list-sessions | grep -n $(tmux display-message -p '#S') | cut -d: -f1) #S "
set -g status-left-length 50
set -g status-right ""
set -g status-right-length 0
# ─────────────────────────────────────────
#  Plugins
# ─────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.3.0'
run '~/.tmux/plugins/tpm/tpm'
